services:
  db:
    image: postgres:16-alpine
    container_name: url-shortener-db-local
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: shorturl
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d shorturl"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  local_sqlc:
    image: sqlc/sqlc:1.30.0
    container_name: sqlc-local
    command: generate
    working_dir: /app
    volumes:
      - "..:/app"
    profiles: ["tools"]

volumes:
  pgdata_local:
