name: Deploy to EC2

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker stop url-shortener-api || true
            docker rm url-shortener-api || true
            docker run -d \
              --name url-shortener-api \
              --restart unless-stopped \
              -p 8080:8080 \
              -e APP_ENV=prod \
              -e SERVER_PORT=${{ secrets.SERVER_PORT }} \
              -e DB_DSN="${{ secrets.DB_DSN }}" \
              -e DB_MAX_CONNS=${{ secrets.DB_MAX_CONNS }} \
              -e DB_MAX_CONN_LIFETIME_SECONDS=${{ secrets.DB_MAX_CONN_LIFETIME_SECONDS }} \
              -e DB_MAX_CONN_IDLE_TIME_SECONDS=${{ secrets.DB_MAX_CONN_IDLE_TIME_SECONDS }} \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_ACCESS_TOKEN_EXPIRY_MINS=${{ secrets.JWT_ACCESS_TOKEN_EXPIRY_MINS }} \
              -e JWT_REFRESH_TOKEN_EXPIRY_DAYS=${{ secrets.JWT_REFRESH_TOKEN_EXPIRY_DAYS }} \
              -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
              -e MONTHLY_QUOTA_ANONYMOUS=${{ secrets.MONTHLY_QUOTA_ANONYMOUS }} \
              -e MONTHLY_QUOTA_USER=${{ secrets.MONTHLY_QUOTA_USER }} \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker image prune -f
