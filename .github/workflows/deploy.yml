name: Deploy to EC2

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (commit SHA)'
        required: false
        default: 'latest'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-backend
  CONTAINER_NAME: url-shortener-api

jobs:
  deploy:
    runs-on: self-hosted
    environment: prod
    steps:
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Tag previous image as backup
        run: |
          if docker image inspect ${{ env.IMAGE_NAME }}:latest > /dev/null 2>&1; then
            PREV_TAG="previous-$(date +%Y%m%d-%H%M%S)"
            docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.IMAGE_NAME }}:$PREV_TAG
            echo "Tagged previous image as $PREV_TAG"
          else
            echo "No previous image found, skipping backup"
          fi

      - name: Pull new image
        run: docker pull ${{ env.IMAGE_NAME }}:${{ inputs.image_tag || 'latest' }}

      - name: Stop and remove old container
        run: |
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

      - name: Run new container
        run: |
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            --network tinyclk \
            --restart unless-stopped \
            -p 8080:8080 \
            -v /home/ubuntu/geoip/GeoLite2-City.mmdb:/app/data/geoip/GeoLite2-City.mmdb:ro \
            -e APP_ENV=prod \
            -e SERVER_PORT=${{ secrets.SERVER_PORT }} \
            -e DB_DSN="${{ secrets.DB_DSN }}" \
            -e DB_MAX_CONNS=${{ secrets.DB_MAX_CONNS }} \
            -e DB_MAX_CONN_LIFETIME_SECONDS=${{ secrets.DB_MAX_CONN_LIFETIME_SECONDS }} \
            -e DB_MAX_CONN_IDLE_TIME_SECONDS=${{ secrets.DB_MAX_CONN_IDLE_TIME_SECONDS }} \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e JWT_ACCESS_TOKEN_EXPIRY_MINS=${{ secrets.JWT_ACCESS_TOKEN_EXPIRY_MINS }} \
            -e JWT_REFRESH_TOKEN_EXPIRY_DAYS=${{ secrets.JWT_REFRESH_TOKEN_EXPIRY_DAYS }} \
            -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
            -e MONTHLY_QUOTA_ANONYMOUS=${{ secrets.MONTHLY_QUOTA_ANONYMOUS }} \
            -e MONTHLY_QUOTA_USER=${{ secrets.MONTHLY_QUOTA_USER }} \
            -e REDIS_ADDR="${{ secrets.REDIS_ADDR }}" \
            -e REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
            -e REDIS_DB="${{ secrets.REDIS_DB }}" \
            -e GEOIP_DB_PATH=/app/data/geoip/GeoLite2-City.mmdb \
            ${{ env.IMAGE_NAME }}:${{ inputs.image_tag || 'latest' }}

      - name: Verify deployment
        run: |
          sleep 5
          if docker ps | grep -q ${{ env.CONTAINER_NAME }}; then
            echo "Container is running"
            docker logs --tail 20 ${{ env.CONTAINER_NAME }}
          else
            echo "Container failed to start"
            docker logs ${{ env.CONTAINER_NAME }}
            exit 1
          fi

      - name: Cleanup old images
        run: docker image prune -f --filter "until=168h"
